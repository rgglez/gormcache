name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [".", "redis", "bbolt", "memcached"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: ${{ matrix.module == '.' && 'go.sum' || format('{0}/go.sum', matrix.module) }}

      - name: Build
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Vet
        run: go vet ./...
        working-directory: ${{ matrix.module }}

      - name: Test
        run: go test ./...
        working-directory: ${{ matrix.module }}
